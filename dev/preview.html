<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>storz-bickel-card · mock preview</title>
    <style>
      body {
        margin: 0;
        background: #0b0a08;
        min-height: 100vh;
        padding: 32px;
        font-family: ui-monospace, monospace;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #6b6459;
        font-size: 12px;
        margin: 0 auto 20px;
        max-width: 1328px;
      }
      #toolbar input[type="range"] {
        flex: 1;
        accent-color: #ff6a3d;
      }
      #frame {
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <span>container width</span>
      <input id="width" type="range" min="320" max="1600" value="1328" />
      <span id="width-label">1328px</span>
    </div>
    <div id="frame"></div>
    <script type="module" src="/preview.js"></script>
  </body>
</html>
