name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Daily — keeps HACS validation honest as upstream rules evolve.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  check:
    name: Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: script/check

  hacs:
    # https://github.com/hacs/action
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate
        uses: hacs/action@main
        with:
          category: plugin
